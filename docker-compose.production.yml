# Production compose — pulls the craig image from GHCR instead of building locally.
#
# Required files on the server (NOT in the image — contain your secrets/config):
#   install.config              — copy from install.config.example and fill in
#   apps/bot/config/default.js  — bot config (gitignored, see apps/bot/config/_default.js)
#   apps/tasks/config/default.js — tasks config
#
# Set CRAIG_IMAGE to override the image (e.g. if using your own fork):
#   CRAIG_IMAGE=ghcr.io/your-user/craig:latest docker compose -f docker-compose.production.yml up -d

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./install.config
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - 'db_data:/var/lib/postgresql/data'

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"

  craig:
    image: ${CRAIG_IMAGE:-ghcr.io/craigchat/craig:latest}
    restart: always
    env_file:
      - ./install.config
    ports:
      - "3000:3000"
      - "5029:5029"
    depends_on:
      db:
        condition: service_healthy
        restart: true
      redis:
        condition: service_started
    volumes:
      # Secrets/config — never inside the image
      - './install.config:/app/install.config:ro'
      # Bot and tasks runtime config (gitignored, user-provided)
      - './apps/bot/config:/app/apps/bot/config'
      - './apps/tasks/config:/app/apps/tasks/config'
      # Recording storage
      - '/mnt/media8tb/craig-recordings:/app/rec'
      - '/mnt/media8tb/craig-recordings/tasmas:/app/rec/tasmas'

  tasmas:
    build:
      context: .
      dockerfile: tasmas/Dockerfile
    restart: always
    env_file:
      - ./install.config
    environment:
      INSTALL_CONFIG: /app/install.config
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
    depends_on:
      craig:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - '/mnt/media8tb/craig-recordings:/mnt/media8tb/craig-recordings'
      - './install.config:/app/install.config:ro'
      - './tasmas:/app/tasmas:ro'
      - '/var/run/docker.sock:/var/run/docker.sock'

volumes:
  db_data:
  craig_rec:
