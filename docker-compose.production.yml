# Production compose — pulls per-service images from GHCR.
#
# Required files on the server (NOT in the image — contain your secrets/config):
#   .env                        — copy from .env.example and fill in
#   apps/bot/config/default.js  — bot config (gitignored, see apps/bot/config/_default.js)
#   apps/tasks/config/default.js — tasks config
#
# Override image refs for forks:
#   CRAIG_BOT_IMAGE, CRAIG_DASHBOARD_IMAGE, CRAIG_DOWNLOAD_IMAGE, CRAIG_TASKS_IMAGE

services:
  db:
    image: postgres:16-alpine
    restart: always
    env_file:
      - ./.env
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - 'db_data:/var/lib/postgresql/data'

  redis:
    image: redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  migrate:
    image: ${CRAIG_BOT_IMAGE:-ghcr.io/mhd-hi/craig-ai/bot:latest}
    command: ["npx", "prisma", "migrate", "deploy", "--schema=/app/prisma/schema.prisma"]
    restart: "no"
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  bot:
    image: ${CRAIG_BOT_IMAGE:-ghcr.io/mhd-hi/craig-ai/bot:latest}
    restart: always
    env_file:
      - ./.env
    environment:
      TASKS_URL: http://tasks:2022
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - './apps/bot/config:/app/apps/bot/config'
      - '${CRAIG_RECORDINGS_DIR:?Set CRAIG_RECORDINGS_DIR in .env}:/app/rec'

  dashboard:
    image: ${CRAIG_DASHBOARD_IMAGE:-ghcr.io/mhd-hi/craig-ai/dashboard:latest}
    restart: always
    env_file:
      - ./.env
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    depends_on:
      migrate:
        condition: service_completed_successfully

  download:
    image: ${CRAIG_DOWNLOAD_IMAGE:-ghcr.io/mhd-hi/craig-ai/download:latest}
    restart: always
    env_file:
      - ./.env
    ports:
      - "5029:5029"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5029/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - '${CRAIG_RECORDINGS_DIR:?Set CRAIG_RECORDINGS_DIR in .env}:/app/rec'
      - 'download_cache:${DOWNLOADS_PATH:-/app/downloads}'

  tasks:
    image: ${CRAIG_TASKS_IMAGE:-ghcr.io/mhd-hi/craig-ai/tasks:latest}
    restart: always
    env_file:
      - ./.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2022/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_started
    volumes:
      - './apps/tasks/config:/app/apps/tasks/config'
      - '${CRAIG_RECORDINGS_DIR:?Set CRAIG_RECORDINGS_DIR in .env}:/app/rec'
      - 'download_cache:${DOWNLOADS_PATH:-/app/downloads}'

  tasmas:
    image: ${CRAIG_TASMAS_IMAGE:-ghcr.io/mhd-hi/craig-ai/tasmas:latest}
    restart: always
    env_file:
      - ./.env
    environment:
      INSTALL_CONFIG: /app/.env
      PYTHONDONTWRITEBYTECODE: "1"
      PYTHONUNBUFFERED: "1"
      CRAIG_INTERNAL_API_URL: http://bot:3001/deliver-summary
      CRAIG_INTERNAL_TRPC_URL: http://tasks:2022
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      bot:
        condition: service_started
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - '${CRAIG_RECORDINGS_DIR:?Set CRAIG_RECORDINGS_DIR in .env}:${CRAIG_RECORDINGS_DIR}'
      - './.env:/app/.env:ro'
      - '/var/run/docker.sock:/var/run/docker.sock'

volumes:
  db_data:
  download_cache:
