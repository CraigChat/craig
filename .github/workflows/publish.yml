name: Publish Docker Images

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push bot
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: bot
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/bot:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/bot:master_${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push dashboard
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: dashboard
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/dashboard:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/dashboard:master_${{ github.sha }}
          cache-from: type=gha

      - name: Build and push download
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: download
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/download:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/download:master_${{ github.sha }}
          cache-from: type=gha

      - name: Build and push tasks
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          target: tasks
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/tasks:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/tasks:master_${{ github.sha }}
          cache-from: type=gha

      - name: Build and push tasmas
        uses: docker/build-push-action@v6
        with:
          context: .
          file: tasmas/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository }}/tasmas:latest
            ${{ env.REGISTRY }}/${{ github.repository }}/tasmas:master_${{ github.sha }}
          cache-from: type=gha
