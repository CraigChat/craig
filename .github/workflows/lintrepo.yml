name: Manypkg
on:
  push:
    paths:
      - ".github/workflows/lintrepo.yml"
      - "apps/*/package.json"
      - "package.json"
  workflow_dispatch:

jobs:
  check:
    name: Lint monorepo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node v22
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'yarn'

      - name: Install dependencies
        run: yarn

      - name: Run Manypkg
        run: yarn lint:monorepo
