name: Smoke Tests

on:
  push:
    branches: [master]
    paths:
      - 'docker-compose*.yml'
      - '**/Dockerfile'
      - '.env.example'
      - 'tests/smoke/smoke.env'
  pull_request:
    branches: [master]
    paths:
      - 'docker-compose*.yml'
      - '**/Dockerfile'
      - '.env.example'
      - 'tests/smoke/smoke.env'
  workflow_dispatch:

jobs:
  smoke:
    name: Docker Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare smoke environment
        run: |
          cp tests/smoke/smoke.env .env.smoke
          ln -s .env.smoke .env
          mkdir -p /tmp/smoke-rec

      - name: Build and start services
        run: |
          docker compose --env-file .env.smoke -f docker-compose.yml -f docker-compose.smoke.override.yml up --build --wait --wait-timeout 180
        timeout-minutes: 25

      - name: Assert health endpoints
        run: |
          curl -sf http://localhost:5029/health | grep '"ok"'
          curl -sf http://localhost:3000/api/health | grep '"ok"'

      - name: Verify containers run as non-root
        run: |
          for svc in download tasks dashboard; do
            uid=$(docker compose --env-file .env.smoke -f docker-compose.yml -f docker-compose.smoke.override.yml exec -T "$svc" id -u)
            [ "$uid" != "0" ] || { echo "$svc is running as root!"; exit 1; }
            echo "$svc UID=$uid (non-root OK)"
          done

      - name: Print logs on failure
        if: failure()
        run: docker compose --env-file .env.smoke -f docker-compose.yml -f docker-compose.smoke.override.yml logs --no-color

      - name: Tear down
        if: always()
        run: docker compose --env-file .env.smoke -f docker-compose.yml -f docker-compose.smoke.override.yml down -v
